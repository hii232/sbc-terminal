name: tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Install browser test runtime
        run: |
          npm install --no-save playwright@1.45.3
          npx playwright install --with-deps chromium
      - name: Regression tests (production engines)
        run: node tests/run_tests.js
      - name: Browser smoke tests
        run: node tests/browser_smoke.js
      - name: Universe + security checks
        run: |
          node -e "const u=require('./data/universe.json'); const fs=require('fs'); const t=u.companies.map(c=>c.ticker); if(u.count!==60||u.companies.length!==60||new Set(t).size!==60||t.includes('FLUT')) process.exit(1); for (const c of u.companies){ if(!c.cik||!c.cik10||!fs.existsSync('./data/companies/'+c.ticker+'.json')||!fs.existsSync('./data/raw/'+c.ticker+'/sec-facts-extract.json')) process.exit(1); } const sec=require('fs').readFileSync('./sec.js','utf8'); if(!/const SEC = /.test(sec)) process.exit(1); console.log('universe OK exactly', u.count)"
          ! grep -rE "api_key=|token=[A-Za-z0-9]{20}" --include="*.js" --include="*.html" . || (echo 'possible key leak' && exit 1)
      - name: Golden audit gate
        run: python scripts/golden_audit.py
