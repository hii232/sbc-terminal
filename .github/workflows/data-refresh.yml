name: data-refresh
on:
  schedule:
    - cron: "0 11 * * 1-5"   # weekdays 11:00 UTC (pre-US-open)
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Refresh fundamentals + quotes + sectors (keyless)
        run: python scripts/update_data.py
      - name: Refresh 12m price history
        run: python scripts/gen_prices.py
      - name: Refresh SEC filing facts
        run: python scripts/sec_ingest.py
      - name: Collect earnings intelligence (beat/miss ledger + consensus + revisions)
        run: python scripts/collect_earnings.py
      - name: Track BlackRock (EDGAR filings + 13F holdings diff)
        run: python scripts/track_blackrock.py
      - name: Record model track-record snapshot
        run: node scripts/snapshot_scores.js
      - name: Build what-changed signals ledger (deltas + filing diffs)
        run: node scripts/build_signals.js
      - name: Tests must pass before commit
        run: node tests/run_tests.js
      - name: Golden audit must pass before commit
        run: python scripts/golden_audit.py
      - name: Commit refreshed data
        run: |
          git config user.name "sbc-terminal-bot"
          git config user.email "actions@github.com"
          git add data.js sec.js track.js earnings.js signals.js blackrock.js data/ || true
          git diff --cached --quiet || git commit -m "data: automated refresh $(date -u +%F)"
          git push
