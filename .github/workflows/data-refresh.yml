name: data-refresh
on:
  schedule:
    - cron: "0 11 * * 1-5"   # weekdays 11:00 UTC (pre-US-open)
  workflow_dispatch: {}
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Refresh fundamentals + quotes + sectors (keyless)
        run: python scripts/update_data.py
      - name: Refresh 12m price history
        run: python scripts/gen_prices.py
      - name: Refresh SEC filing facts
        run: python scripts/sec_ingest.py
      - name: Tests must pass before commit
        run: node tests/run_tests.js
      - name: Commit refreshed data
        run: |
          git config user.name "sbc-terminal-bot"
          git config user.email "actions@github.com"
          git add data.js sec.js data/ || true
          git diff --cached --quiet || git commit -m "data: automated refresh $(date -u +%F)"
          git push
